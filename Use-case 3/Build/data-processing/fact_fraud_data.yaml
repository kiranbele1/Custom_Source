version: v1
name: wf-fraud-360-dataset
type: workflow
tags:
  - Tier.Gold
  - fraud
description: Transforms and joins customer_transaction with dimension tables into fact_fraud_data. Deduplicates at source before watermark filter to handle ingestion duplicates.

workflow:
  title: Data Ingestion
  dag:
    - name: wf-fraud-360-dataset
      title: Details Data Ingestion Process

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m
          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            inputs:
              - name: customer_transaction
                dataset: dataos://icebase:btsschema/customer_transaction?acl=rw
                format: iceberg

              - name: pipeline_control
                dataset: dataos://icebase:btsschema/pipeline_control?acl=rw
                format: iceberg

              - name: dim_entity_master
                dataset: dataos://icebase:btsschema/dim_entity_master?acl=rw
                format: iceberg

              - name: dim_products_master
                dataset: dataos://icebase:btsschema/dim_products_master?acl=rw
                format: iceberg

              - name: dim_global_customer
                dataset: dataos://icebase:btsschema/dim_global_customer?acl=rw
                format: iceberg

              - name: dim_customer
                dataset: dataos://icebase:btsschema/dim_customer?acl=rw
                format: iceberg

            outputs:
              - name: fact_fraud_data
                dataset: dataos://icebase:btsschema/fact_fraud_data?acl=rw
                format: Iceberg
                description: Clean fact table with one row per unique customer fraud event.
                tags:
                  - Tier.Gold
                  - Domain.SOFL
                title: Data Transformations
                options:
                  saveMode: append
                  iceberg:
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:

                  # Step 1: watermark
                  - name: watermark
                    sql: |
                      SELECT MIN(latest_date) AS watermark_ts
                      FROM pipeline_control

                  # Step 2: deduplicate customer_transaction FULLY first
                  # before applying any watermark filter
                  # partitioning by BOTH src_customer_unique_id AND gcid
                  # handles cases where same person has multiple rows from
                  # multiple ingestion runs with different created_at timestamps
                  - name: ct_fully_deduped
                    sql: |
                      SELECT
                        src_customer_unique_id,
                        src_txn_unique_id,
                        name,
                        pan,
                        dob,
                        mobile_number,
                        email_id,
                        pincode,
                        nationality,
                        fraud_category,
                        detail_of_fraud,
                        date_of_incident,
                        amount_involved,
                        reported_by,
                        product_name,
                        product_code,
                        product_category,
                        risk_class,
                        city,
                        district,
                        state,
                        region,
                        tier,
                        aml_risk_weight,
                        ground_of_suspicion,
                        txn_type_name,
                        txn_category,
                        onboarding_date,
                        gcid,
                        created_at,
                        updated_at
                      FROM (
                        SELECT
                          *,
                          ROW_NUMBER() OVER (
                            PARTITION BY gcid
                            ORDER BY updated_at DESC
                          ) AS rn
                        FROM customer_transaction
                        WHERE gcid IS NOT NULL
                      )
                      WHERE rn = 1

                  # Step 3: now apply watermark filter on clean deduped data
                  # using MAX(created_at) per gcid so we use the latest timestamp
                  - name: ct_incremental
                    sql: |
                      SELECT ct.*
                      FROM ct_fully_deduped ct
                      CROSS JOIN watermark w
                      WHERE ct.updated_at > w.watermark_ts

                  # Step 4: dedup dim_customer - one active row per customer
                  - name: dim_customer_active
                    sql: |
                      SELECT
                        customerid,
                        src_customer_unique_id,
                        reported_by,
                        mobile,
                        pan,
                        dob,
                        email,
                        gcid,
                        effective_from,
                        effective_to,
                        is_current,
                        created_at,
                        updated_at
                      FROM (
                        SELECT
                          *,
                          ROW_NUMBER() OVER (
                            PARTITION BY src_customer_unique_id
                            ORDER BY effective_from DESC
                          ) AS rn
                        FROM dim_customer
                        WHERE is_current = 'Y'
                      )
                      WHERE rn = 1

                  # Step 5: dedup dim_entity_master - one row per entity_code
                  - name: dim_entity_deduped
                    sql: |
                      SELECT
                        entity_id,
                        entity_code,
                        entity_name,
                        entity_type,
                        data_provider_flag,
                        onboarding_date
                      FROM (
                        SELECT
                          *,
                          ROW_NUMBER() OVER (
                            PARTITION BY entity_code
                            ORDER BY onboarding_date DESC
                          ) AS rn
                        FROM dim_entity_master
                      )
                      WHERE rn = 1

                  # Step 6: dedup dim_products_master - one row per product_name
                  - name: dim_products_deduped
                    sql: |
                      SELECT
                        product_id,
                        product_code,
                        product_name,
                        product_category,
                        sub_category,
                        risk_class,
                        created_at
                      FROM (
                        SELECT
                          *,
                          ROW_NUMBER() OVER (
                            PARTITION BY product_name
                            ORDER BY created_at DESC
                          ) AS rn
                        FROM dim_products_master
                      )
                      WHERE rn = 1

                  # Step 7: final join on clean data from all sides
                  - name: fact_fraud_data
                    sql: |
                      SELECT
                        uuid()                          AS fraud_event_id,
                        t.src_customer_unique_id,
                        t.src_txn_unique_id,
                        t.name,
                        t.pan,
                        t.dob,
                        t.mobile_number,
                        t.email_id,
                        t.pincode,
                        t.nationality,
                        t.fraud_category,
                        t.detail_of_fraud,
                        t.date_of_incident,
                        t.amount_involved,
                        t.reported_by,
                        t.product_name,
                        t.product_code,
                        t.product_category,
                        t.risk_class,
                        t.city,
                        t.district,
                        t.state,
                        t.region,
                        t.tier,
                        t.aml_risk_weight,
                        t.ground_of_suspicion,
                        t.txn_type_name,
                        t.txn_category,
                        t.onboarding_date,

                        t.gcid,

                        e.entity_id,
                        e.entity_code,
                        e.entity_name,
                        e.entity_type,
                        e.data_provider_flag,
                        e.onboarding_date              AS entity_onboarding_date,

                        p.product_id,
                        p.product_code                 AS master_product_code,
                        p.product_name                 AS master_product_name,
                        p.product_category             AS master_product_category,
                        p.sub_category,
                        p.risk_class                   AS master_risk_class,
                        p.created_at,

                        dc.customerid,
                        current_date()                 AS loaded_at

                      FROM ct_incremental t
                      LEFT JOIN dim_entity_deduped e
                        ON t.reported_by = e.entity_code
                      LEFT JOIN dim_products_deduped p
                        ON t.product_name = p.product_name
                      LEFT JOIN dim_customer_active dc
                        ON t.src_customer_unique_id = dc.src_customer_unique_id