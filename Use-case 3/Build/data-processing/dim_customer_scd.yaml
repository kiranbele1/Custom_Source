version: v1
name: wf-dim-customer-scd2
type: workflow

tags:
  - Tier.Gold
  - fraud
description: Daily SCD2 merge into dim_customer. Closes old rows then inserts new active rows.

workflow:
  title: Dim Customer SCD2 Daily

  dag:
    # ── JOB 1: Close matched existing active rows via MERGE ──────────────────
    - name: job-close-existing-rows
      title: Close Existing Active Rows

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m
          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            inputs:
              - name: customer_transaction_input
                dataset: dataos://icebase:btsschema/customer_transaction?acl=rw
                format: iceberg

              - name: dim_customer_existing
                dataset: dataos://icebase:btsschema/dim_customer?acl=rw
                format: iceberg

              - name: pipeline_control
                dataset: dataos://icebase:btsschema/pipeline_control?acl=rw
                format: iceberg

            outputs:
              - name: incoming_customers_deduped
                dataset: dataos://icebase:btsschema/dim_customer?acl=rw
                format: iceberg
                options:
                  saveMode: overwrite
                  merge:
                    onClause: >
                      old.src_customer_unique_id = new.src_customer_unique_id
                      OR old.gcid = new.gcid
                    whenClause: >
                      MATCHED AND old.is_current = 'Y' THEN UPDATE SET
                      old.effective_to = new.effective_to,
                      old.is_current = new.is_current,
                      old.updated_at = new.updated_at
                  iceberg:
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:

                  # Step 1: get watermark
                  - name: watermark
                    sql: |
                      SELECT MIN(latest_date) AS watermark_ts
                      FROM pipeline_control

                  # Step 2: deduplicate incoming - one row per customer
                  - name: ranked_customers
                    sql: |
                      SELECT *,
                        ROW_NUMBER() OVER (
                          PARTITION BY src_customer_unique_id
                          ORDER BY created_at DESC
                        ) AS rn
                      FROM customer_transaction_input ct
                      CROSS JOIN watermark w
                      WHERE ct.gcid       IS NOT NULL
                        AND ct.created_at  > w.watermark_ts

                  # Step 3: build close-row payload
                  # join with dim_customer_existing to get ALL columns
                  # including customerid, effective_from, created_at
                  # which are required by dim_customer table schema
                  # without this join the job fails with
                  # CANNOT_FIND_DATA for customerid — proven in testing
                  - name: incoming_deduped
                    sql: |
                      SELECT
                        src_customer_unique_id,
                        reported_by,
                        mobile_number AS mobile,
                        pan,
                        dob,
                        email_id      AS email,
                        gcid
                      FROM ranked_customers
                      WHERE rn = 1

                  - name: incoming_customers_deduped
                    sql: |
                      SELECT
                        d.customerid,
                        i.src_customer_unique_id,
                        i.reported_by,
                        i.mobile,
                        i.pan,
                        i.dob,
                        i.email,
                        i.gcid,
                        d.effective_from,
                        current_date()    AS effective_to,
                        'N'               AS is_current,
                        d.created_at,
                        CURRENT_TIMESTAMP AS updated_at
                      FROM incoming_deduped i
                      INNER JOIN dim_customer_existing d
                        ON (
                          i.src_customer_unique_id = d.src_customer_unique_id
                          OR i.gcid = d.gcid
                        )
                      WHERE d.is_current = 'Y'

    # ── JOB 2: Insert new active rows via APPEND ─────────────────────────────
    - name: job-insert-new-rows
      title: Insert New Active Rows
      dependencies:
        - job-close-existing-rows

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m
          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            inputs:
              - name: customer_transaction_input
                dataset: dataos://icebase:btsschema/customer_transaction?acl=rw
                format: iceberg

              - name: dim_customer_existing
                dataset: dataos://icebase:btsschema/dim_customer?acl=rw
                format: iceberg

              - name: pipeline_control
                dataset: dataos://icebase:btsschema/pipeline_control?acl=rw
                format: iceberg

            outputs:
              - name: new_active_rows
                dataset: dataos://icebase:btsschema/dim_customer?acl=rw
                format: iceberg
                options:
                  saveMode: append
                  iceberg:
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:

                  # Step 1: get watermark
                  - name: watermark
                    sql: |
                      SELECT MIN(latest_date) AS watermark_ts
                      FROM pipeline_control

                  # Step 2: deduplicate incoming
                  - name: ranked_customers
                    sql: |
                      SELECT *,
                        ROW_NUMBER() OVER (
                          PARTITION BY src_customer_unique_id
                          ORDER BY created_at DESC
                        ) AS rn
                      FROM customer_transaction_input ct
                      CROSS JOIN watermark w
                      WHERE ct.gcid       IS NOT NULL
                        AND ct.created_at  > w.watermark_ts

                  - name: incoming_customers
                    sql: |
                      SELECT
                        src_customer_unique_id,
                        reported_by,
                        mobile_number AS mobile,
                        pan,
                        dob,
                        email_id      AS email,
                        gcid
                      FROM ranked_customers
                      WHERE rn = 1

                  # Step 3: get current max customerid to continue sequence
                  - name: max_customer_id
                    sql: |
                      SELECT COALESCE(MAX(customerid), 0) AS max_id
                      FROM dim_customer_existing

                  # Step 4: find truly new customers only
                  # LEFT JOIN on is_current = Y only — so customers just
                  # closed by Job 1 (now is_current = N) do not block
                  # insertion of their new active row
                  - name: truly_new_customers
                    sql: |
                      SELECT i.*
                      FROM incoming_customers i
                      LEFT JOIN dim_customer_existing d
                        ON (
                          i.src_customer_unique_id = d.src_customer_unique_id
                          OR i.gcid = d.gcid
                        )
                        AND d.is_current = 'Y'
                      WHERE d.customerid IS NULL

                  # Step 5: assign new customerid continuing from max existing
                  # CROSS JOIN on single-row max_customer_id is safe
                  - name: new_active_rows
                    sql: |
                      SELECT
                        (monotonically_increasing_id() + m.max_id + 1) AS customerid,
                        i.src_customer_unique_id,
                        i.reported_by,
                        i.mobile,
                        i.pan,
                        i.dob,
                        i.email,
                        i.gcid,
                        current_date()                  AS effective_from,
                        CAST(DATE '9999-12-31' AS DATE) AS effective_to,
                        'Y'                             AS is_current,
                        CURRENT_TIMESTAMP               AS created_at,
                        CURRENT_TIMESTAMP               AS updated_at
                      FROM truly_new_customers i
                      CROSS JOIN max_customer_id m