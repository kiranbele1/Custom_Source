version: v1
name: wf-update-gcid
type: workflow

tags:
  - Tier.Gold
  - fraud
description: Backfills gcid into customer_transaction from dim_global_customer using merge update.

workflow:
  title: Update GCID in customer_transaction

  dag:
    - name: wf-update-gcid
      title: GCID Backfill via Merge Update

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m

          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            inputs:
              - name: customer_transaction_input
                dataset: dataos://icebase:btsschema/customer_transaction?acl=rw
                format: iceberg

              - name: dim_global_customer_input
                dataset: dataos://icebase:btsschema/dim_global_customer?acl=rw
                format: iceberg

            outputs:
              - name: customer_transaction_updated
                dataset: dataos://icebase:btsschema/customer_transaction?acl=rw
                format: iceberg
                options:
                  # overwrite + merge confirmed working in DataOS Flare
                  # CRITICAL: ALL rows must be in SELECT — not just gcid=NULL rows
                  # because overwrite + merge drops any row absent from SELECT
                  # this was proven by data loss (48 → 24 rows) in earlier testing
                  saveMode: overwrite
                  merge:
                    onClause: "old.pan = new.pan AND old.mobile_number = new.mobile_number AND old.dob = new.dob"
                    whenClause: >
                      MATCHED AND old.gcid IS NULL THEN UPDATE SET
                      old.gcid = new.gcid,
                      old.updated_at = new.updated_at
                  iceberg:
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:

                  # Step 1: normalize dim_global_customer dob
                  # dob in dim_global_customer is stored as DATE type
                  # so CAST to STRING before RLIKE
                  - name: gcid_lookup
                    sql: |
                      SELECT DISTINCT
                        gcid,
                        mobile_number,
                        pan,
                        CASE
                          WHEN CAST(dob AS STRING) RLIKE '^[0-9]{2}-[0-9]{2}-[0-9]{4}$'
                            THEN date_format(
                                   to_date(CAST(dob AS STRING), 'dd-MM-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          WHEN CAST(dob AS STRING) RLIKE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
                            THEN CAST(dob AS STRING)
                          WHEN CAST(dob AS STRING) RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}$'
                            THEN date_format(
                                   to_date(regexp_replace(CAST(dob AS STRING), '/', '-'), 'M-d-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          WHEN CAST(dob AS STRING) RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{2}$'
                            THEN date_format(
                                   to_date(regexp_replace(CAST(dob AS STRING), '/', '-'), 'd-M-yy'),
                                   'yyyy-MM-dd'
                                 )
                          ELSE CAST(dob AS STRING)
                        END AS dob_str
                      FROM dim_global_customer_input
                      WHERE gcid IS NOT NULL

                  # Step 2: normalize ALL rows from customer_transaction
                  # NO filter here — ALL rows must be included
                  # because saveMode overwrite drops rows absent from SELECT
                  # rows with gcid already filled will pass through unchanged
                  # via LEFT JOIN + COALESCE in step 3
                  - name: ct_normalized
                    sql: |
                      SELECT
                        ct.*,
                        CASE
                          WHEN ct.dob RLIKE '^[0-9]{2}-[0-9]{2}-[0-9]{4}$'
                            THEN date_format(
                                   to_date(ct.dob, 'dd-MM-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          WHEN ct.dob RLIKE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
                            THEN ct.dob
                          WHEN ct.dob RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}$'
                            THEN date_format(
                                   to_date(regexp_replace(ct.dob, '/', '-'), 'M-d-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          WHEN ct.dob RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{2}$'
                            THEN date_format(
                                   to_date(regexp_replace(ct.dob, '/', '-'), 'd-M-yy'),
                                   'yyyy-MM-dd'
                                 )
                          ELSE NULL
                        END AS dob_normalized
                      FROM customer_transaction_input ct

                  # Step 3: LEFT JOIN so ALL rows are preserved
                  # rows with gcid already filled → g.gcid is NULL from LEFT JOIN
                  #   → COALESCE keeps ct.gcid → updated_at unchanged
                  # rows with gcid IS NULL → g.gcid filled from lookup
                  #   → COALESCE picks g.gcid → updated_at set to now
                  - name: customer_transaction_updated
                    sql: |
                      SELECT
                        ct.src_customer_unique_id,
                        ct.src_txn_unique_id,
                        ct.name,
                        ct.pan,
                        ct.dob,
                        ct.mobile_number,
                        ct.email_id,
                        ct.pincode,
                        ct.nationality,
                        ct.fraud_category,
                        ct.detail_of_fraud,
                        ct.date_of_incident,
                        ct.amount_involved,
                        ct.reported_by,
                        ct.product_name,
                        ct.product_code,
                        ct.product_category,
                        ct.risk_class,
                        ct.city,
                        ct.district,
                        ct.state,
                        ct.region,
                        ct.tier,
                        ct.aml_risk_weight,
                        ct.ground_of_suspicion,
                        ct.txn_type_name,
                        ct.txn_category,
                        ct.onboarding_date,
                        COALESCE(ct.gcid, g.gcid) AS gcid,
                        ct.created_at,
                        CASE
                          WHEN ct.gcid IS NULL AND g.gcid IS NOT NULL
                            THEN CURRENT_TIMESTAMP
                          ELSE ct.updated_at
                        END AS updated_at
                      FROM ct_normalized ct
                      LEFT JOIN gcid_lookup g
                        ON  ct.pan            = g.pan
                        AND ct.mobile_number  = g.mobile_number
                        AND ct.dob_normalized = g.dob_str