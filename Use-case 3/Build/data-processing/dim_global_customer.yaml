version: v1
name: wf-sog-gcid-resolution
type: workflow

tags:
  - Tier.Gold
  - fraud
description: Reads records from customer_transaction, normalizes dob, generates gcid using MD5 and writes distinct gcid mapping into dim_global_customer. Merge handles deduplication.

workflow:
  title: GCID Resolution

  dag:
    - name: wf-sog-gcid-resolution
      title: GCID Resolution Data Ingestion Process
      description: Extracts distinct mobile, pan, dob combinations from customer_transaction, normalizes dob to yyyy-MM-dd before MD5, loads into dim_global_customer. Merge ensures no duplicates.

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m

          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            inputs:
              - name: customer_transaction_input
                dataset: dataos://icebase:btsschema/customer_transaction?acl=rw
                format: iceberg

            outputs:
              - name: dim_global_customer
                dataset: dataos://icebase:btsschema/dim_global_customer?acl=rw
                format: iceberg
                description: Global customer dimension with MD5 generated GCIDs.
                tags:
                  - Tier.Gold
                  - Domain.SOFL
                title: Data Transformations
                options:
                  saveMode: overwrite
                  iceberg:
                    merge:
                      onClause: "old.gcid = new.gcid"
                      whenClause: "NOT MATCHED THEN INSERT *"
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:
                  # Step 1: normalize dob to yyyy-MM-dd before computing MD5
                  # Handles all known formats across reporters:
                  #   dd-MM-yyyy  → 17-12-1978  (new format seen in this run)
                  #   yyyy-MM-dd  → 1978-12-17  (standard ISO)
                  #   dd/MM/yy    → 27/12/02    (2-digit year slash)
                  #   M/d/yyyy    → 7/22/1953   (US slash format)
                  - name: dob_normalized
                    sql: |
                      SELECT
                        pan,
                        mobile_number,
                        CASE
                          -- dd-MM-yyyy  e.g. 17-12-1978
                          WHEN dob RLIKE '^[0-9]{2}-[0-9]{2}-[0-9]{4}$'
                            THEN date_format(
                                   to_date(dob, 'dd-MM-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          -- yyyy-MM-dd  e.g. 1978-12-17
                          WHEN dob RLIKE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
                            THEN dob
                          -- M/d/yyyy or d/M/yyyy  e.g. 7/22/1953
                          WHEN dob RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}$'
                            THEN date_format(
                                   to_date(regexp_replace(dob, '/', '-'), 'M-d-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          -- d/M/yy  e.g. 27/12/02
                          WHEN dob RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{2}$'
                            THEN date_format(
                                   to_date(regexp_replace(dob, '/', '-'), 'd-M-yy'),
                                   'yyyy-MM-dd'
                                 )
                          ELSE NULL
                        END AS dob_normalized
                      FROM customer_transaction_input
                      WHERE pan IS NOT NULL
                        AND dob IS NOT NULL
                        AND mobile_number IS NOT NULL

                  # Step 2: compute MD5 on normalized dob and write to dim_global_customer
                  - name: dim_global_customer
                    sql: |
                      SELECT DISTINCT
                        md5(CONCAT(pan, dob_normalized, mobile_number)) AS gcid,
                        mobile_number,
                        dob_normalized AS dob,
                        pan,
                        CURRENT_TIMESTAMP AS created_at,
                        CURRENT_TIMESTAMP AS updated_at
                      FROM dob_normalized
                      WHERE dob_normalized IS NOT NULL