version: v1
name: wf-dim-customer-init
type: workflow

tags:
  - Tier.Gold
  - fraud
description: Initial load of dim_customer from customer_transaction. Run ONCE only.

workflow:
  title: Dim Customer Initial Load

  dag:
    - name: wf-dim-customer-init
      title: Dim Customer Initial Load

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m

          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            inputs:
              - name: customer_transaction_input
                dataset: dataos://icebase:btsschema/customer_transaction?acl=rw
                format: iceberg

            outputs:
              - name: dim_customer_final
                dataset: dataos://icebase:btsschema/dim_customer?acl=rw
                format: iceberg
                tags:
                  - Tier.Gold
                title: Dim Customer Initial Load
                options:
                  saveMode: overwrite
                  iceberg:
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:

                  # Step 1: deduplicate by gcid keeping latest record
                  # DISTINCT on all columns is wrong because same customer
                  # can have different src_customer_unique_id across reporters
                  # ROW_NUMBER PARTITION BY gcid is the correct dedup key
                  - name: deduped_customers
                    sql: |
                      SELECT *
                      FROM (
                        SELECT *,
                          ROW_NUMBER() OVER (
                            PARTITION BY gcid
                            ORDER BY created_at DESC
                          ) AS rn
                        FROM customer_transaction_input
                        WHERE gcid IS NOT NULL
                      )
                      WHERE rn = 1

                  # Step 2: build final dim_customer with all SCD2 columns
                  - name: dim_customer_final
                    sql: |
                      SELECT
                        (monotonically_increasing_id() + 1) AS customerid,
                        src_customer_unique_id,
                        reported_by,
                        mobile_number                       AS mobile,
                        pan,
                        dob,
                        email_id                            AS email,
                        gcid,
                        current_date()                      AS effective_from,
                        CAST(DATE '9999-12-31' AS DATE)     AS effective_to,
                        'Y'                                 AS is_current,
                        CURRENT_TIMESTAMP                   AS created_at,
                        CURRENT_TIMESTAMP                   AS updated_at
                      FROM deduped_customers