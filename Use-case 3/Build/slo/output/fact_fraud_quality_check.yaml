name: soda-fraud-fact-360-quality
version: v1
type: workflow
tags:
  - workflow
  - soda-checks
  - fraud
  - Tier.Gold
description: Applying quality checks for the fraud fact dataset
workspace: public
workflow:
  # schedule:
  #   cron: '00 09 * * *'
  #   concurrencyPolicy: Forbid
  dag:
    - name: soda-fraud-fact-360-quality
      spec:
        stack: soda+python:1.0
        compute: runnable-default
        resources:
          requests:
            cpu: 1000m
            memory: 250Mi
          limits:
            cpu: 1000m
            memory: 250Mi
        logLevel: INFO

        stackSpec:
          inputs:
            - dataset: dataos://icebase:btsschema/fact_fraud_data
              options:
                engine: minerva
                clusterName: miniature
              profile:
                columns:
                  - include *
              checks:
                - schema:
                    name: Validate schema for fact_fraud_data dataset
                    fail:
                      when wrong column type:
                        fraud_event_id: varchar
                        src_customer_unique_id: varchar
                        src_txn_unique_id: varchar
                        name: varchar
                        pan: varchar
                        dob: date
                        mobile_number: varchar
                        email_id: varchar
                        pincode: integer
                        nationality: varchar
                        fraud_category: varchar
                        detail_of_fraud: varchar
                        date_of_incident: date
                        amount_involved: integer
                        reported_by: varchar
                    attributes:
                      category: Schema

                - missing_count(mobile_number) = 0:
                    name: Mobile number should not be missing
                    attributes:
                      category: Completeness

                - invalid(mobile_number):
                    name: Mobile number must be 10 digits starting with 6-9
                    attributes:
                      category: Validity
                    fail:
                      when:
                        - regex mismatch:
                            mobile_number: ^[6-9][0-9]{9}$

                - missing_count(dob) = 0:
                    name: Date of birth should not be missing
                    attributes:
                      category: Completeness

                - missing_count(pan) = 0:
                    name: PAN should not be missing
                    attributes:
                      category: Completeness

                - invalid(pan):
                    name: PAN should be in following format
                    attributes:
                      category: Validity
                    fail:
                      when:
                        - regex mismatch:
                            pan: ^[A-Z]{5}[0-9]{4}[A-Z]$

                - missing_count(name) = 0:
                    name: Customer name should not be missing
                    attributes:
                      category: Completeness

                - invalid(pincode):
                    name: Pincode must be 6 digits not starting with 0
                    attributes:
                      category: Validity
                    fail:
                      when:
                        - regex mismatch:
                            pincode: ^[1-9][0-9]{5}$

                - missing_count(entity_code) = 0:
                    name: Entity code should not be missing
                    attributes:
                      category: Completeness

                - duplicate_count(entity_code) = 0:
                    name: Entity code should not be duplicated
                    attributes:
                      category: Uniqueness

                - missing_count(entity_name) = 0:
                    name: Entity name should not be missing
                    attributes:
                      category: Completeness

                - missing_count(product_code) = 0:
                    name: Product code should not be missing
                    attributes:
                      category: Completeness

                - duplicate_count(product_code) = 0:
                    name: Product code should not be duplicated
                    attributes:
                      category: Uniqueness

                - missing_count(product_name) = 0:
                    name: Product name should not be missing
                    attributes:
                      category: Completeness

                - missing_count(fraud_category) = 0:
                    name: Fraud category should not be missing
                    attributes:
                      category: Completeness

                - missing_count(amount_involved) = 0:
                    name: Amount involved should not be missing
                    attributes:
                      category: Completeness

                - min(amount_involved) >= 0:
                    name: Amount involved should not be negative
                    attributes:
                      category: Validity

                - max(amount_involved) <= 1000000:
                    name: Amount involved should not exceed 1000000
                    attributes:
                      category: Validity

                - missing_count(date_of_incident) = 0:
                    name: Date of incident should not be missing
                    attributes:
                      category: Completeness

                - missing_count(src_customer_unique_id) = 0:
                    name: Customer ID should not be missing
                    attributes:
                      category: Completeness

                - duplicate_count(src_customer_unique_id) = 0:
                    name: Customer ID should not be duplicated
                    attributes:
                      category: Uniqueness

                - missing_count(src_txn_unique_id) = 0:
                    name: Transaction ID should not be missing
                    attributes:
                      category: Completeness

                - duplicate_count(src_txn_unique_id) = 0:
                    name: Transaction ID should not be duplicated
                    attributes:
                      category: Uniqueness

                - invalid(email_id):
                    name: Custom email format checks
                    attributes:
                      category: Validity
                    fail:
                      when:
                        any:
                          - is null: email_id
                          - regex mismatch:
                              email_id: ^[a-zA-Z0-9]+([._][a-zA-Z0-9]+)*@[a-zA-Z]+\.[a-zA-Z]{2,}$
