name: soda-customer-transaction-quality
version: v1
type: workflow
tags:
  - workflow
  - soda-checks
  - sales
description: Applying quality checks for the customers sales data
workspace: public
workflow:
  # schedule:
  #   cron: '00 08 * * *'
  #   concurrencyPolicy: Forbid
  dag:
    - name: soda-customer-transaction-quality
      spec:
        stack: soda+python:1.0
        compute: runnable-default
        resources:
          requests:
            cpu: 1000m
            memory: 250Mi
          limits:
            cpu: 1000m
            memory: 250Mi
        logLevel: INFO

        stackSpec:
          inputs:
            - dataset: dataos://icebase:btsschema/customer_transaction
              options:
                engine: minerva
                clusterName: training
              profile:
                columns:
                  - include *
              checks:
                - schema:
                    name: Validate schema for customers dataset
                    fail:
                      when wrong column type:
                        src_customer_unique_id: varchar
                        src_txn_unique_id: varchar
                        name: varchar
                        pan: varchar
                        dob: date
                        mobile_number: varchar
                        email_id: varchar
                        pincode: integer
                        nationality: varchar
                        fraud_category: varchar
                        detail_of_fraud: varchar
                        date_of_incident: date
                        amount_involved: integer
                        reported_by: varchar
                        product_name: varchar
                        product_category: varchar
                        risk_class: varchar
                        city: varchar
                        district: varchar
                        state: varchar
                        region: varchar
                        tier: varchar
                        aml_risk_weight: integer  
                        ground_of_suspicion: varchar
                        txn_type_name: varchar
                        txn_category: varchar
                        onboarding_date: date
                    attributes:
                      category: Schema

                - missing_count(src_customer_unique_id) = 0:
                    name: Customer ID should not be missing
                    attributes:
                      category: Completeness

                - duplicate_count(src_customer_unique_id) = 0:
                    name: Customer ID should not be duplicated
                    attributes:
                      category: Uniqueness

                - missing_count(src_txn_unique_id) = 0:
                    name: Customer ID should not be missing
                    attributes:
                      category: Completeness

                - duplicate_count(src_txn_unique_id) = 0:
                    name: Customer ID should not be duplicated
                    attributes:
                      category: Uniqueness   

                - missing_count(pan) = 0:
                    name: pan should not be missing
                    attributes:
                      category: Completeness                                         

                - missing_count(mobile_number) = 0:
                    name: pan should not be missing
                    attributes:
                      category: Completeness   

                - missing_count(fraud_category) = 0:
                    name: pan should not be missing
                    attributes:
                      category: Completeness  

                - missing_count(detail_of_fraud) = 0:
                    name: pan should not be missing
                    attributes:
                      category: Completeness  

                - missing_count(date_of_incident) = 0:
                    name: pan should not be missing
                    attributes:
                      category: Completeness           

                - missing_count(amount_involved) = 0:
                    name: pan should not be missing
                    attributes:
                      category: Completeness                                        

                - missing_count(name) = 0:
                    name: Customer name should not be missing
                    attributes:
                      category: Completeness

                - invalid(pan):
                    name: PAN should be in following format
                    attributes:
                      category: Validity
                    fail:
                      when: 
                        - regex mismatch: 
                            pan: ^[A-Z]{5}[0-9]{4}[A-Z]$


                - invalid(email_id):
                    name: Custom email format checks
                    attributes:
                      category: Validity
                    fail:
                      when:
                        any:
                          - is null: email_id
                          - regex mismatch:
                              email_id: ^[a-zA-Z0-9]+([._][a-zA-Z0-9]+)*@[a-zA-Z]+\.[a-zA-Z]{2,}$
                    
                - invalid(mobile_number):
                    name: Mobile number must be 10 digits
                    fail:
                      when:
                        - regex mismatch:
                            mobile_number: ^[6-9][0-9]{9}$

                - invalid(pincode):
                    name: Pincode must be 6 digits
                    fail:
                      when:
                        - regex mismatch:
                            pincode: ^[0-9]{6}$

                - invalid_count(consent_obtained_indicator) = 0:
                    name: Consent must be 'Y'
                    fail:
                      when:
                        - not equals:
                            consent_obtained_indicator: 'Y'
                    attributes:
                      category: Validity                           

                - min(amount_involved) > 0:
                    name: Amount should be greater than zero
                    attributes:
                      category: Validity
