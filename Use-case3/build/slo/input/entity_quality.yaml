name: soda-entity-fraud-quality
version: v1
type: workflow
tags:
  - workflow
  - soda-checks
  - sales
description: Applying quality checks for the customers sales data
workspace: public
workflow:
  # schedule:
  #   cron: '00 08 * * *'
  #   concurrencyPolicy: Forbid
  dag:
    - name: soda-entity-fraud-quality
      spec:
        stack: soda+python:1.0
        compute: runnable-default
        resources:
          requests:
            cpu: 1000m
            memory: 250Mi
          limits:
            cpu: 1000m
            memory: 250Mi
        logLevel: INFO

        stackSpec:
          inputs:
            - dataset: dataos://icebase:aml/dim_entity_master
              options:
                engine: minerva
                clusterName: training
              profile:
                columns:
                  - include *
              checks:
                - schema:
                    name: Validate schema for fraud dataset
                    fail:
                      when wrong column type:
                        entity_id: integer
                        entity_code: varchar
                        entity_name: varchar
                        entity_type: varchar 
                        data_provider_flag: varchar
                        onboarding_date: date
                    attributes:
                      category: Schema

                - missing_count(entity_id) = 0:
                    name: Customer ID should not be missing
                    attributes:
                      category: Completeness

                - duplicate_count(entity_id) = 0:
                    name: Customer ID should not be duplicated
                    attributes:
                      category: Uniqueness

                - invalid_count(entity_id) = 0:
                    name: Customer ID should be greater than zero
                    valid min: 1
                    attributes:
                      category: Validity
