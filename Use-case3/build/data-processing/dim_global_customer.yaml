version: v1
name: wf-sog-gcid-resolution
type: workflow

tags:
  - Tier.Gold
  - fraud
description: Reads records from customer_transaction, generates gcid using MD5 and appends new gcid mapping into dim_global_customer.

workflow:
  title: GCID Resolution

  dag:
    - name: wf-sog-gcid-resolution
      title: GCID Resolution Data Ingestion Process

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m

          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            sparkConf:
              - spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

            inputs:
              - name: customer_transaction_input
                dataset: dataos://icebase:aml/customer_transaction?acl=rw
                format: iceberg

              - name: pipeline_control
                dataset: dataos://icebase:aml/pipeline_control?acl=rw
                format: iceberg

            outputs:
              - name: dim_global_customer
                dataset: dataos://icebase:aml/dim_global_customer?acl=rw
                format: iceberg
                options:
                  saveMode: overwrite
                  merge:
                    onClause: "old.gcid = new.gcid"
                    whenClause: >
                      NOT MATCHED THEN INSERT *
                  properties:
                    write.format.default: parquet
                    write.metadata.compression-codec: snappy

            steps:
              - sequence:
                  - name: watermark
                    sql: |
                      SELECT CAST(MIN(latest_date) AS TIMESTAMP) AS watermark_ts
                      FROM pipeline_control

                  - name: gcid_deduped
                    sql: |
                      SELECT /*+ REPARTITION(pan, mobile_number, dob) */
                        pan,
                        mobile_number,
                        dob
                      FROM (
                        SELECT
                          pan,
                          mobile_number,
                          dob,
                          created_at,
                          ROW_NUMBER() OVER (
                            PARTITION BY pan, mobile_number, dob
                            ORDER BY created_at DESC
                          ) AS rn
                        FROM customer_transaction_input
                        WHERE pan           IS NOT NULL
                          AND dob           IS NOT NULL
                          AND mobile_number IS NOT NULL
                          AND created_at    > (SELECT watermark_ts FROM watermark)
                      )
                      WHERE rn = 1

                  - name: dim_global_customer
                    sql: |
                      SELECT
                        md5(CONCAT(pan, dob, mobile_number)) AS gcid,
                        mobile_number,
                        dob,
                        pan,
                        CURRENT_TIMESTAMP AS created_at
                      FROM gcid_deduped