version: v1
name: wf-sog-gcid-resolution
type: workflow

tags:
  - Tier.Gold
  - fraud
description: Reads records from customer_transaction, normalizes dob, generates gcid using MD5 and writes distinct gcid mapping into dim_global_customer. Merge handles deduplication.

workflow:
  title: GCID Resolution

  dag:
    - name: wf-sog-gcid-resolution
      title: GCID Resolution Data Ingestion Process

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m

          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            inputs:
              - name: customer_transaction_input
                dataset: dataos://icebase:aml/customer_transaction?acl=rw
                format: iceberg

              - name: pipeline_control
                dataset: dataos://icebase:aml/pipeline_control?acl=rw
                format: iceberg

            outputs:
              - name: dim_global_customer
                dataset: dataos://icebase:aml/dim_global_customer?acl=rw
                format: iceberg
                options:
                  # overwrite + merge is the ONLY confirmed working approach
                  # in DataOS Flare. append + merge was tested and proven to
                  # silently ignore merge and blindly append — causing duplicates.
                  # overwrite + merge does NOT wipe the table — merge protects
                  # existing rows. Performance is handled by watermark on input.
                  saveMode: overwrite
                  merge:
                    onClause: "old.gcid = new.gcid"
                    whenClause: "NOT MATCHED THEN INSERT *"
                  iceberg:
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:

                  # Step 1: get watermark — MIN across all reporters
                  # ensures no reporter's new records are missed
                  # this is what gives performance — only new records
                  # are processed, not the full table
                  - name: watermark
                    sql: |
                      SELECT MIN(latest_date) AS watermark_ts
                      FROM pipeline_control

                  # Step 2: normalize dob to yyyy-MM-dd
                  # filter only records newer than watermark
                  # CROSS JOIN on single-row watermark to make
                  # watermark_ts available as a column for filtering
                  - name: dob_normalized
                    sql: |
                      SELECT
                        ct.pan,
                        ct.mobile_number,
                        CASE
                          WHEN ct.dob RLIKE '^[0-9]{2}-[0-9]{2}-[0-9]{4}$'
                            THEN date_format(
                                   to_date(ct.dob, 'dd-MM-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          WHEN ct.dob RLIKE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
                            THEN ct.dob
                          WHEN ct.dob RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}$'
                            THEN date_format(
                                   to_date(regexp_replace(ct.dob, '/', '-'), 'M-d-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          WHEN ct.dob RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{2}$'
                            THEN date_format(
                                   to_date(regexp_replace(ct.dob, '/', '-'), 'd-M-yy'),
                                   'yyyy-MM-dd'
                                 )
                          ELSE NULL
                        END AS dob_normalized
                      FROM customer_transaction_input ct
                      CROSS JOIN watermark w
                      WHERE ct.pan           IS NOT NULL
                        AND ct.dob           IS NOT NULL
                        AND ct.mobile_number IS NOT NULL
                        AND ct.created_at    > w.watermark_ts

                  # Step 3: dedup on business keys ONLY before adding timestamps
                  # timestamps not added yet so DISTINCT works correctly
                  - name: gcid_deduped
                    sql: |
                      SELECT DISTINCT
                        pan,
                        mobile_number,
                        dob_normalized
                      FROM dob_normalized
                      WHERE dob_normalized IS NOT NULL

                  # Step 4: compute MD5 and add timestamps AFTER dedup
                  - name: dim_global_customer
                    sql: |
                      SELECT
                        md5(CONCAT(pan, dob_normalized, mobile_number)) AS gcid,
                        mobile_number,
                        dob_normalized                                   AS dob,
                        pan,
                        CURRENT_TIMESTAMP AS created_at,
                        CURRENT_TIMESTAMP AS updated_at
                      FROM gcid_deduped