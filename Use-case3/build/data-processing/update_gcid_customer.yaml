version: v1
name: wf-update-gcid
type: workflow

tags:
  - Tier.Gold
  - fraud
description: Rewrites customer_transaction with gcid backfilled from dim_global_customer.

workflow:
  title: Update GCID in customer_transaction

  dag:
    - name: wf-update-gcid
      title: GCID Backfill Rewrite

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m

          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            inputs:
              - name: customer_transaction_input
                dataset: dataos://icebase:btsschema/customer_transaction?acl=rw
                format: iceberg

              - name: dim_global_customer_input
                dataset: dataos://icebase:btsschema/dim_global_customer?acl=rw
                format: iceberg

            outputs:
              - name: customer_transaction_final
                dataset: dataos://icebase:btsschema/customer_transaction?acl=rw
                format: iceberg
                options:
                  saveMode: overwrite
                  iceberg:
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:
                  # Step 1: normalize dim_global_customer dob - handles both
                  # yyyy-MM-dd (DATE type) and slash-format string dobs
                  - name: gcid_lookup
                    sql: |
                      SELECT DISTINCT
                        gcid,
                        mobile_number,
                        CASE
                          WHEN CAST(dob AS STRING) RLIKE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
                            THEN CAST(dob AS STRING)
                          WHEN CAST(dob AS STRING) RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}$'
                            THEN date_format(
                                   to_date(regexp_replace(CAST(dob AS STRING), '/', '-'), 'M-d-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          WHEN CAST(dob AS STRING) RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{2}$'
                            THEN date_format(
                                   to_date(regexp_replace(CAST(dob AS STRING), '/', '-'), 'd-M-yy'),
                                   'yyyy-MM-dd'
                                 )
                          ELSE CAST(dob AS STRING)
                        END AS dob_str,
                        pan
                      FROM dim_global_customer_input
                      WHERE gcid IS NOT NULL

                  # Step 2: normalize customer_transaction dob
                  - name: ct_normalized
                    sql: |
                      SELECT *,
                        CASE
                          WHEN dob RLIKE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
                            THEN dob
                          WHEN dob RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}$'
                            THEN date_format(
                                   to_date(regexp_replace(dob, '/', '-'), 'M-d-yyyy'),
                                   'yyyy-MM-dd'
                                 )
                          WHEN dob RLIKE '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{2}$'
                            THEN date_format(
                                   to_date(regexp_replace(dob, '/', '-'), 'd-M-yy'),
                                   'yyyy-MM-dd'
                                 )
                          ELSE NULL
                        END AS dob_normalized
                      FROM customer_transaction_input

                  # Step 3: join and backfill gcid
                  - name: customer_transaction_final
                    sql: |
                      SELECT
                        ct.src_customer_unique_id,
                        ct.src_txn_unique_id,
                        ct.name,
                        ct.pan,
                        ct.dob,
                        ct.mobile_number,
                        ct.email_id,
                        ct.pincode,
                        ct.nationality,
                        ct.fraud_category,
                        ct.detail_of_fraud,
                        ct.date_of_incident,
                        ct.amount_involved,
                        ct.reported_by,
                        ct.product_name,
                        ct.product_code,
                        ct.product_category,
                        ct.risk_class,
                        ct.city,
                        ct.district,
                        ct.state,
                        ct.region,
                        ct.tier,
                        ct.aml_risk_weight,
                        ct.ground_of_suspicion,
                        ct.txn_type_name,
                        ct.txn_category,
                        ct.onboarding_date,
                        COALESCE(ct.gcid, g.gcid) AS gcid,
                        ct.created_at,
                        CURRENT_TIMESTAMP AS updated_at
                      FROM ct_normalized ct
                      LEFT JOIN gcid_lookup g
                        ON  ct.mobile_number  = g.mobile_number
                        AND ct.pan            = g.pan
                        AND ct.dob_normalized = g.dob_str