version: v1
name: wf-update-gcid
type: workflow

tags:
  - Tier.Gold
  - fraud
description: Backfills gcid into customer_transaction from dim_global_customer using merge update.

workflow:
  title: Update GCID in customer_transaction

  dag:
    - name: wf-update-gcid
      title: GCID Backfill via Merge Update

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m

          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            sparkConf:
              - spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

            inputs:
              - name: customer_transaction_input
                dataset: dataos://icebase:aml/customer_transaction?acl=rw
                format: iceberg

              - name: dim_global_customer_input
                dataset: dataos://icebase:aml/dim_global_customer?acl=rw
                format: iceberg

            outputs:
              - name: customer_transaction_updated
                dataset: dataos://icebase:aml/customer_transaction?acl=rw
                format: iceberg
                options:
                  saveMode: overwrite         
                  merge:
                    onClause: "old.pan = new.pan AND old.mobile_number = new.mobile_number AND old.dob = new.dob"
                    whenClause: >
                      MATCHED AND old.gcid IS NULL THEN UPDATE SET
                      old.gcid = new.gcid,
                      old.updated_at = new.updated_at
                  iceberg:
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:

                  - name: gcid_lookup
                    sql: |
                      SELECT DISTINCT
                        gcid,
                        mobile_number,
                        pan,
                        CAST(dob AS STRING) AS dob_str
                      FROM dim_global_customer_input
                      WHERE gcid IS NOT NULL

                  - name: ct_normalized
                    sql: |
                      SELECT
                        ct.*,
                        ct.dob AS dob_normalized
                      FROM customer_transaction_input ct

                  - name: customer_transaction_updated
                    sql: |
                      SELECT
                        ct.src_customer_unique_id,
                        ct.src_txn_unique_id,
                        ct.name,
                        ct.pan,
                        ct.dob,
                        ct.mobile_number,
                        ct.email_id,
                        ct.pincode,
                        ct.nationality,
                        ct.fraud_category,
                        ct.detail_of_fraud,
                        ct.date_of_incident,
                        ct.amount_involved,
                        ct.reported_by,
                        ct.product_name,
                        ct.product_code,
                        ct.product_category,
                        ct.risk_class,
                        ct.city,
                        ct.district,
                        ct.state,
                        ct.region,
                        ct.tier,
                        ct.aml_risk_weight,
                        ct.ground_of_suspicion,
                        ct.txn_type_name,
                        ct.txn_category,
                        ct.onboarding_date,
                        ct.source_file_name,
                        COALESCE(ct.gcid, g.gcid) AS gcid,
                        ct.created_at,
                        CASE
                          WHEN ct.gcid IS NULL AND g.gcid IS NOT NULL
                            THEN CURRENT_TIMESTAMP
                          ELSE ct.updated_at
                        END AS updated_at
                      FROM ct_normalized ct
                      LEFT JOIN gcid_lookup g
                        ON  ct.pan            = g.pan
                        AND ct.mobile_number  = g.mobile_number
                        AND ct.dob_normalized = g.dob_str