---
version: v1
name: wf-prodctmasterdata-ingestion
type: workflow
tags:
  - Tier.Gold
  - fraud
  - Sterling & Oak Group   
description: The workflow transforms and cleans data from source, ensuring it aligns with Lakehouse schema standards. After transformations, the data is ingested into Lakehouse, enabling reliable access for analytics and downstream applications.
workflow:
  title: Data Ingestion 
  dag:
    - name: wf-ingestion
      title: Details Data Ingestion Process
      description: The DAG for Data Transformation and Ingestion automates the process of transforming and cleaning product data before loading it into the target system, ensuring it is ready for analysis and reporting.
      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default
        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m
          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m 
          job:
            explain: true  
            inputs: 
              - name: products_data
                dataset: dataos://usecasedepot:aml/sofl/master/processed/Product_Dimension.csv/?acl=rw
                format: csv

            logLevel: INFO
            outputs:
              - name: step1
                dataset: dataos://icebase:aml/dim_products_master?acl=rw
                format: Iceberg
                description: The dataset contains comprehensive information about business opportunities within the practice domain, including opportunity details, client information, engagement types, and potential revenue. This dataset enables tracking of opportunity progression, performance analysis, and strategic decision-making for practice growth and client relationship management.
                tags:
                  - Tier.Gold
                  - Domain.SOFL
                options:
                  saveMode: append
                  iceberg:                              
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

                title:  Data Transformations

            steps:
              - sequence:
                  - name: step1
                    sql: |
                      SELECT
                      *, 
                      'y' AS is_active,
                      CAST(CURRENT_TIMESTAMP AS TIMESTAMP) AS created_at,
                      CAST(CURRENT_TIMESTAMP AS TIMESTAMP) AS updated_at
                      from products_data
