version: v1
name: wf-fraud-360-dataset
type: workflow
tags:
  - Tier.Gold
  - fraud
description: Transforms and joins customer_transaction with dimension tables into fact_fraud_data.

workflow:
  title: Fraud 360 Dataset
  dag:
    - name: wf-fraud-360-dataset
      title: Fraud 360 Dataset

      spec:
        tags:
          - Tier.Gold
        stack: flare:6.0
        compute: runnable-default

        stackSpec:
          driver:
            coreLimit: 1050m
            cores: 1
            memory: 1200m
          executor:
            coreLimit: 1400m
            cores: 1
            instances: 1
            memory: 1600m

          job:
            explain: true
            logLevel: INFO

            sparkConf:
              - spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

            inputs:
              - name: customer_transaction
                dataset: dataos://icebase:aml/customer_transaction?acl=rw
                format: iceberg

              - name: pipeline_control
                dataset: dataos://icebase:aml/pipeline_control?acl=rw
                format: iceberg

              - name: dim_entity_master
                dataset: dataos://icebase:aml/dim_entity_master?acl=rw
                format: iceberg

              - name: dim_products_master
                dataset: dataos://icebase:aml/dim_products_master?acl=rw
                format: iceberg

              - name: dim_customer
                dataset: dataos://icebase:aml/dim_customer?acl=rw
                format: iceberg

            outputs:
              - name: fact_fraud_data
                dataset: dataos://icebase:aml/fact_fraud_data?acl=rw
                format: iceberg
                options:
                  saveMode: overwrite
                  merge:
                    onClause: "old.src_txn_unique_id = new.src_txn_unique_id"
                    whenClause: "NOT MATCHED THEN INSERT *"
                  iceberg:
                    properties:
                      write.format.default: parquet
                      write.metadata.compression-codec: snappy

            steps:
              - sequence:

                  # Step 1: watermark
                  - name: watermark
                    sql: |
                      SELECT MAX(latest_date) AS watermark_ts
                      FROM pipeline_control

                  - name: ct_clean
                    sql: |
                      SELECT
                        src_customer_unique_id,
                        src_txn_unique_id,
                        name,
                        pan,
                        dob,
                        mobile_number,
                        email_id,
                        pincode,
                        nationality,
                        fraud_category,
                        detail_of_fraud,
                        date_of_incident,
                        amount_involved,
                        reported_by,
                        product_name,
                        product_code,
                        product_category,
                        risk_class,
                        city,
                        district,
                        state,
                        region,
                        tier,
                        aml_risk_weight,
                        ground_of_suspicion,
                        txn_type_name,
                        txn_category,
                        onboarding_date,
                        gcid,
                        updated_at
                      FROM (
                        SELECT
                          ct.*,
                          ROW_NUMBER() OVER (
                            PARTITION BY ct.src_txn_unique_id
                            ORDER BY ct.updated_at DESC
                          ) AS rn
                        FROM customer_transaction ct
                        CROSS JOIN watermark w
                        WHERE ct.gcid       IS NOT NULL
                          AND ct.created_at > w.watermark_ts
                      )
                      WHERE rn = 1

                  # Step 3: get latest active customerid per gcid from dim_customer
                  - name: dc_clean
                    sql: |
                      SELECT customerid, gcid
                      FROM (
                        SELECT
                          customerid,
                          gcid,
                          ROW_NUMBER() OVER (
                            PARTITION BY gcid
                            ORDER BY created_at DESC
                          ) AS rn
                        FROM dim_customer
                        WHERE UPPER(TRIM(is_current)) = 'Y'
                      )
                      WHERE rn = 1

                  # Step 4: final join to build fact_fraud_data
                  - name: fact_fraud_data
                    sql: |
                      SELECT
                        uuid()                          AS fraud_event_id,
                        t.src_customer_unique_id,
                        t.src_txn_unique_id,
                        t.name,
                        t.pan,
                        t.dob,
                        t.mobile_number,
                        t.email_id,
                        t.pincode,
                        t.nationality,
                        t.fraud_category,
                        t.detail_of_fraud,
                        t.date_of_incident,
                        t.amount_involved,
                        t.reported_by,
                        t.product_name,
                        t.product_code,
                        t.product_category,
                        t.risk_class,
                        t.city,
                        t.district,
                        t.state,
                        t.region,
                        t.tier,
                        t.aml_risk_weight,
                        t.ground_of_suspicion,
                        t.txn_type_name,
                        t.txn_category,
                        t.onboarding_date,
                        t.gcid,
                        e.entity_id,
                        e.entity_code,
                        e.entity_name,
                        e.entity_type,
                        e.data_provider_flag,
                        e.onboarding_date              AS entity_onboarding_date,
                        p.product_id,
                        p.product_code                 AS master_product_code,
                        p.product_name                 AS master_product_name,
                        p.product_category             AS master_product_category,
                        p.sub_category,
                        p.risk_class                   AS master_risk_class,
                        p.created_at,
                        dc.customerid,
                        current_date()                 AS loaded_at
                      FROM ct_clean t
                      LEFT JOIN dim_entity_master e
                        ON t.reported_by = e.entity_code
                      LEFT JOIN dim_products_master p
                        ON t.product_name = p.product_name
                      LEFT JOIN dc_clean dc
                        ON t.gcid = dc.gcid
                        