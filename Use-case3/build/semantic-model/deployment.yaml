name: btsfraudtrend
version: v1alpha
layer: user
type: lens
tags:
  - lens
description: Fraud trend analysis semantic model.
lens:
  compute: runnable-default
  source:
    type: minerva
    name: training       
    catalog: icebase
  repo:
    url: https://github.com/kiranbele1/Custom_Source
    lensBaseDir: Custom_Source/Use-case3/build/semantic-model/model
    syncFlags:
      - --ref=main
  api:
    replicas: 1
    logLevel: Info
    resources:
      requests:
        cpu: 100m
        memory: 256Mi     
      limits:
        cpu: 256m
        memory: 256Mi
  worker:
    replicas: 1
    logLevel: Info
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 256m
        memory: 256Mi
  router:
    logLevel: info
    resources:
      requests:
        cpu: 100m
        memory: 256Mi  
      limits:
        cpu: 256m
        memory: 256Mi
  metric:
    logLevel: info
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi