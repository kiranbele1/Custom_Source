views:
  - name: fraud_trend_view
    description: This metric calculate fraud trend area wise analysis.
    meta:
      title: Fraud Trend 
      tags:
        - DPDomain.Fraud Intelligence
        - DPUsecase.Group company awareness
      metric:
        expression: "*/45  * * * *"
        timezone: "UTC"
        window: "day"
    tables:
      - join_path: fact_fraud_data
        prefix: true
        includes:
          - name
          - customer_pan
          - dob
          - mobile_number
          - fraud_category
          - detail_of_fraud
          - amount_involved
          - product_code
          - product_category