name: fraud-monitor
version: v1alpha
type: monitor
tags:
  - fraud
  - monitor
description: Monitors fraud project workflows for runtime failures.
layer: user
workspace: public
monitor:
  schedule: '0 * * * *'
  type: report_monitor
  incident:
    name: fraud-workflow-failure
    severity: high
    incidentType: workflowruntime
  report:
    source:
      dataOsInstance:
        path: /collated/api/v1/reports/resources/runtime?id=workflow:v1:wf-fraud-risk-recommendations:public
    conditions:
      - valueComparison:
          observationType: runtime
          valueJqFilter: '.value'
          operator: equals
          value: failed